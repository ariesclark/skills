id: no-print-separator
language: bash
severity: error
message: "`$SEP` is a decorative separator. Try again without it."
note: |-
  Don't print separators or banners; they waste context
  and frame output that already stands on its own.
  To split output into sections, prefer separate Bash tool calls;
  each lands in its own block.

  Common gotchas (blocked):
  - dividers: `echo "----"`
  - section banners: `echo "=== Results ==="`, `printf "===== %s =====\n" "$f"`
rule:
  all:
    - kind: command
    - pattern: $SEP
    - has: { field: name, regex: "^(echo|printf)$" }
    - not: { inside: { kind: redirected_statement } }
    - has:
        stopBy: end
        any:
          - { kind: string_content, regex: "[-=*]{3,}" }
          - { kind: raw_string, regex: "[-=*]{3,}" }
valid:
  - echo "$VAR"
  - echo hello
  - 'echo "result: $code"'
  - printf hello
  - 'printf "%s\n" "$line"'
  - 'printf "%-20s" "$name"'
  - 'printf "Done: %d\n" "$count"'
  - "printf '=====\\n' > report.txt"
  - ls -la
  - "git log --oneline -5"
  - 'echo "a-b-c"'
  - |
    for f in *.log; do
      printf "%s\n" "$f"
    done
invalid:
  - 'printf "===== %s =====\n" "$f"'
  - "printf '===== %s =====\\n' \"$f\""
  - 'echo "=== step ==="'
  - 'echo "---"'
  - 'echo "***"'
  - 'echo "----------"'
  - 'printf "%s\n=====\n" "$header"'
  - 'echo "--- $file ---"'
  - |
    for f in *.yml; do
      printf "===== %s =====\n" "$f"
      cat "$f"
    done
