id: no-print-separator
language: bash
severity: error
message: "`$SEP` is a decorative separator. Try again without it."
note: |-
  Never print a decorative separator or banner to format output,
  such as a line of dashes or equals or a `=== label ===` header.
  
  Output from each tool call already appears in its own block, so
  to break output into sections, make a separate call per section.
  
  What matters is the printed line, not what emits it, so a script
  or program that prints one is banned just the same.

  Common failures (not exhaustive):
  - `echo "----"`
  - `printf "===== %s =====\n" "$f"`
  - `powershell.exe -Command "'=== Results ==='"`
rule:
  any:
    - all:
        - kind: command
        - pattern: $SEP
        - has: { field: name, regex: "^(echo|printf)$" }
        - not: { inside: { kind: redirected_statement } }
        - has:
            stopBy: end
            any:
              - { kind: string_content, regex: "[-=*]{3,}" }
              - { kind: raw_string, regex: "[-=*]{3,}" }
    - all:
        - kind: command
        - pattern: $SEP
        - has: { field: name, regex: '^(powershell(\.exe)?|pwsh)$' }
        - not: { inside: { kind: redirected_statement } }
        - has:
            stopBy: end
            kind: string_content
            regex: "['\"][-=*]{3,}"
valid:
  - echo "$VAR"
  - echo hello
  - 'echo "result: $code"'
  - printf hello
  - 'printf "%s\n" "$line"'
  - 'printf "%-20s" "$name"'
  - 'printf "Done: %d\n" "$count"'
  - "printf '=====\\n' > report.txt"
  - ls -la
  - "git log --oneline -5"
  - 'echo "a-b-c"'
  - "powershell.exe -NoProfile -Command \"Get-Process\""
  - "pwsh -c \"Write-Output $env:PATH\""
  - "powershell -Command \"Get-ChildItem | Select-Object Name\""
  - |
    for f in *.log; do
      printf "%s\n" "$f"
    done
invalid:
  - 'printf "===== %s =====\n" "$f"'
  - "printf '===== %s =====\\n' \"$f\""
  - 'echo "=== step ==="'
  - 'echo "---"'
  - 'echo "***"'
  - 'echo "----------"'
  - 'printf "%s\n=====\n" "$header"'
  - 'echo "--- $file ---"'
  - "powershell.exe -Command \"'=== Results ==='\""
  - "powershell -NoProfile -Command \"'--- step ---'; Get-Process\""
  - "pwsh -c \"Write-Host '----------'\""
  - |
    for f in *.yml; do
      printf "===== %s =====\n" "$f"
      cat "$f"
    done
