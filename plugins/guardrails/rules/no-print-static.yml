id: no-print-static
language: bash
severity: error
message: "`$PRINT` is entirely noise. Try again without it."
note: |-
  Never print fixed text; it wastes context and repeats
  what each command's output and exit status already show.

  Common failures (not exhaustive):
  - status lines: `cmd && echo done`
  - progress logs or labels: `echo "Building..."`, `echo "Results:"`
  - not-found markers: `cmd || printf 'missing'`
rule:
  all:
    - kind: command
    - pattern: $PRINT
    - has: { field: name, regex: "^(echo|printf)$" }
    - not: { inside: { kind: redirected_statement } }
    - not:
        has:
          stopBy: end
          any:
            - { kind: simple_expansion }
            - { kind: expansion }
            - { kind: command_substitution }
            - { kind: arithmetic_expansion }
valid:
  - echo "$VAR"
  - echo $HOME
  - 'echo "${count}"'
  - 'echo "result: $code"'
  - 'echo "$((1 + 1))"'
  - 'echo "files: $(ls | wc -l)"'
  - 'echo "$USER is done"'
  - 'echo "${arr[@]}"'
  - ls -la
  - 'printf "%s\n" "$line"'
  - 'printf "%-20s" "$name"'
  - "echo done > config.txt"
  - "printf 'key=value\\n' > config.txt"
  - |
    result=$(make build)
    echo "$result"
  - |
    for f in *.log; do
      echo "$f"
    done
invalid:
  - echo hello
  - echo done
  - printf hello
  - "printf 'done\\n'"
  - command -v autocannon || echo missing
  - command -v autocannon || printf 'missing\n'
  - 'echo "=== step ==="'
  - 'echo "---"'
  - 'echo "Build finished"'
  - echo ok
  - 'echo "1.0.0"'
  - 'echo "hello world"'
  - 'echo "***"'
  - echo
  - |
    set -euo pipefail
    echo "Deploying to prod"
    kubectl apply -f manifest.yaml
  - |
    make build
    echo "build complete"
