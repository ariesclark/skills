id: skill-description-too-long
language: yaml
severity: error
message: >-
  Skill `description` exceeds 1024 characters. The combined `description` +
  `when_to_use` text can be truncated in the skill listing, silently dropping
  triggering keywords past the cut. Lead with the key use case and move trigger
  phrases into `when_to_use`.
files:
  - "**/SKILL.md"
rule:
  pattern: "description: $D"
constraints:
  D:
    regex: ".{1025,}"
