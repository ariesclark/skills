id: skill-no-trigger-labels
language: markdown
severity: error
message: >-
  Drop the literal "Triggers:" / "Trigger phrases" label from `when_to_use`.
  Weave the keywords into a natural sentence instead. A plain prose description
  of when the skill applies matches just as well as a stuffed keyword list, and
  reads like the rest of the catalog.
files:
  - "**/SKILL.md"
rule:
  kind: minus_metadata
  regex: "when_to_use:(?:[^\\n]|\\n[ \\t])*(?i:triggers?:|trigger phrases?)"
