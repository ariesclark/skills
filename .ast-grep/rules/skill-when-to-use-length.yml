id: skill-when-to-use-too-long
language: yaml
severity: error
message: >-
  Skill `when_to_use` exceeds 512 characters. Combined with `description` it can
  be truncated in the skill listing, silently dropping the trailing trigger
  phrases.
files:
  - "**/SKILL.md"
rule:
  pattern: "when_to_use: $W"
constraints:
  W:
    regex: "[\\s\\S]{513,}"
