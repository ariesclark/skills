name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6.0.9
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: mfinelli/setup-shfmt@v4.0.1
        with:
          shfmt-version: 3.13.1
      - uses: bats-core/bats-action@4.0.0
        with:
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false
      - run: npm install -g @ast-grep/cli@0.43.0
      - run: pnpm lint
      - run: pnpm test
        if: ${{ !cancelled() }}
