ruleDirs:
  - .ast-grep/rules
# SKILL.md is linted as markdown (its native grammar), not forced to YAML. The whole
# file is then one `document` node, so the body-length rule can measure it; forcing
# YAML dropped the body whenever it held markdown the YAML parser choked on, silently
# passing over-length skills. The frontmatter rules match the `minus_metadata` node
# (the `---` block) with regex instead of YAML key patterns.
